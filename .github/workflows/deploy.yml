name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Deploy ke Laptop B1
      ####################################################
      - name: Deploy B1
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@100.101.236.44 << 'EOF'
            set -e

            cd ~/laptop-b1

            echo "=== Updating Repository B1 ==="
            git fetch origin
            git reset --hard origin/main

            echo "=== Deploying Containers B1 ==="
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "=== Deployment B1 Complete ==="
          EOF

      ####################################################
      # Deploy ke Laptop B2
      ####################################################
      - name: Deploy B2
        run: |
          ssh -o StrictHostKeyChecking=no niko@100.103.164.64 << 'EOF'
            set -e

            cd ~/laptop-b2

            echo "=== Updating Repository B2 ==="
            git fetch origin
            git reset --hard origin/main

            echo "=== Deploying Containers B2 ==="
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "=== Deployment B2 Complete ==="
          EOF

      ####################################################
      # Selesai
      ####################################################
      - name: Deployment Finished
        run: echo "Deployment to B1 and B2 completed successfully."
